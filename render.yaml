services:
  - type: web
    name: iffe-sacco-api
    runtime: node
    region: singapore
    plan: free
    rootDir: .
    buildCommand: bun install && cd apps/api && bunx prisma generate
    startCommand: cd apps/api && bun run src/index.ts
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: CORS_ORIGIN
        value: https://iffe-sacco.vercel.app
